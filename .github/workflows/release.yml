name: Build Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+', 'v[0-9]+.[0-9]+.[0-9]+-*']
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 解析版本号
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"          # v1.0.1
            VER="${TAG#v}"                        # 1.0.1
          else
            VER="${{ inputs.version }}"           # 1.0.1
            TAG="v${VER}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "ver=${VER}" >> $GITHUB_OUTPUT

      - name: 构建分平台 Release 包
        run: |
          V="${{ steps.ver.outputs.ver }}"
          P="Course-Evaluation-${V}"

          # macOS 版：只保留 start.command
          mkdir -p "/tmp/mac/${P}"
          git archive --format=tar HEAD | tar -x -C "/tmp/mac/${P}"
          rm -f "/tmp/mac/${P}/start.bat"
          (cd /tmp/mac && zip -rq "${GITHUB_WORKSPACE}/${P}-mac.zip" "${P}")
          echo "✅ ${P}-mac.zip ($(du -h "${GITHUB_WORKSPACE}/${P}-mac.zip" | cut -f1))"

          # Windows 版：只保留 start.bat
          mkdir -p "/tmp/win/${P}"
          git archive --format=tar HEAD | tar -x -C "/tmp/win/${P}"
          rm -f "/tmp/win/${P}/start.command"
          (cd /tmp/win && zip -rq "${GITHUB_WORKSPACE}/${P}-windows.zip" "${P}")
          echo "✅ ${P}-windows.zip ($(du -h "${GITHUB_WORKSPACE}/${P}-windows.zip" | cut -f1))"

          # 验证每个包只有一个启动文件
          echo "--- macOS 包 ---"
          unzip -l "${P}-mac.zip" | grep -E 'start\.|Total files'
          echo "--- Windows 包 ---"
          unzip -l "${P}-windows.zip" | grep -E 'start\.|Total files'

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.ver.outputs.tag }}
          tag_name: ${{ steps.ver.outputs.tag }}
          body: |
            ## 📥 下载

            | 系统 | 使用方式 |
            |------|----------|
            | 🍎 **macOS** | 下载 `-mac.zip`，解压双击 `start.command` |
            | 🪟 **Windows** | 下载 `-windows.zip`，解压双击 `start.bat` |

            首次运行自动创建虚拟环境并安装依赖（2-5 分钟）。修改 `config/term.yaml` 中的 `semester` 字段即可切换学期。
          files: |
            Course-Evaluation-${{ steps.ver.outputs.ver }}-mac.zip
            Course-Evaluation-${{ steps.ver.outputs.ver }}-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
