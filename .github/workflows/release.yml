name: Build Release

# ============================================================
# 复旦大学课评自动填写工具 — 自动发布工作流
#
# 触发条件：推送 v* 标签（如 v1.0.0, v2.3.1）
# 行为：构建 macOS / Windows 两个 zip 包，创建 GitHub Release
# ============================================================

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'   # 支持预发布标签如 v1.0.0-beta1
  workflow_dispatch:                 # 允许手动触发
    inputs:
      version:
        description: '版本号 (如 1.0.0，不含 v 前缀)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取版本号
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          # 去掉 v 前缀得到纯版本号
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: 构建 macOS 版本
        run: |
          git archive --format=zip \
            --prefix="Course-Evaluation-${{ steps.version.outputs.version }}/" \
            --output="Course-Evaluation-${{ steps.version.outputs.version }}-mac.zip" \
            HEAD

      - name: 构建 Windows 版本
        run: |
          git archive --format=zip \
            --prefix="Course-Evaluation-${{ steps.version.outputs.version }}/" \
            --output="Course-Evaluation-${{ steps.version.outputs.version }}-windows.zip" \
            HEAD

      - name: 验证产物
        run: |
          echo "=== macOS 版本 ==="
          unzip -l "Course-Evaluation-${{ steps.version.outputs.version }}-mac.zip" | head -30
          echo ""
          echo "=== Windows 版本 ==="
          unzip -l "Course-Evaluation-${{ steps.version.outputs.version }}-windows.zip" | head -30

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          tag_name: ${{ steps.version.outputs.tag }}
          body: |
            ## 📥 下载

            | 操作系统 | 下载链接 | 使用方法 |
            |----------|----------|----------|
            | 🍎 **macOS** | `Course-Evaluation-${{ steps.version.outputs.version }}-mac.zip` | 解压后双击 `start.command` |
            | 🪟 **Windows** | `Course-Evaluation-${{ steps.version.outputs.version }}-windows.zip` | 解压后双击 `start.bat` |

            ## 🚀 快速开始

            1. 下载对应系统的 zip 文件
            2. 解压到任意目录
            3. **双击启动脚本**（macOS: `start.command` / Windows: `start.bat`）
            4. 首次运行会自动创建虚拟环境并安装依赖（约 2-5 分钟）
            5. 之后每次运行直接启动，无需重复安装

            ## ⚙️ 配置

            编辑 `config/term.yaml`，修改学期字段：

            ```yaml
            semester: "2025-2026-2"    # ← 改成当前学期
            ```

            ## ⌨️ 命令行参数

            | 参数 | 作用 |
            |------|------|
            | `-1 -y` | 全部喜欢，自动提交 |
            | `-2 --dry-run` | 全部一般，干跑预览 |
            | `--headless` | 无头模式（不显示浏览器） |
            | `-v` | 详细日志 |

            详细文档见项目 [README](https://github.com/${{ github.repository }}#readme)。

            ## 📦 环境说明

            - 所有依赖安装在项目文件夹内的 `venv/` 虚拟环境中
            - 不会在系统中留下残留文件
            - 删除项目文件夹即可彻底清除
            - 需要 Python 3.10+（启动脚本会自动检测）
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            Course-Evaluation-${{ steps.version.outputs.version }}-mac.zip
            Course-Evaluation-${{ steps.version.outputs.version }}-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
